name: Sync mux3 README to Org

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout org profile repo
        uses: actions/checkout@v4

      - name: Fetch mux3 README
        run: |
          curl -o profile/README.md https://raw.githubusercontent.com/mux3labs/mux3/main/README.md

      - name: Commit and push if changed
        run: |
          git config user.name "mux3-bot"
          git config user.email "bot@mux3.dev"
          git add profile/README.md
          git commit -m "Sync README from mux3 repo" || echo "No changes"
          git push
